name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject site password hash
        env:
          SITE_ACCESS_PASSWORD: ${{ secrets.SITE_ACCESS_PASSWORD }}
        run: |
          if [ -z "${SITE_ACCESS_PASSWORD}" ]; then
            echo "::error::Add an Actions secret named SITE_ACCESS_PASSWORD (Repo → Settings → Secrets and variables → Actions → New repository secret)."
            exit 1
          fi
          HASH=$(printf '%s' "${SITE_ACCESS_PASSWORD}" | sha256sum | awk '{print $1}')
          sed -i "s|__GH_PAGES_ACCESS_SHA256__|${HASH}|g" index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
